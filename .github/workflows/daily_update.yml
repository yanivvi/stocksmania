name: Daily Stock Update

on:
  schedule:
    # 6am Israel time (4am UTC) on weekdays
    - cron: '0 4 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: stocks-data
  cancel-in-progress: false

jobs:
  update-stocks:
    runs-on: ubuntu-latest
    outputs:
      site_built: ${{ steps.site.outputs.built }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch latest stock data
        run: |
          TICKERS=$(grep -v '^#' stocks.txt | grep -v '^$' | tr '\n' ' ')
          echo "Updating: $TICKERS"
          python main.py daily -s $TICKERS

      - name: Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MY_HOLDINGS: ${{ secrets.MY_HOLDINGS }}
        run: python telegram_notify.py

      - name: Commit updated data and charts
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/ charts/
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "📈 Daily stock update - $(date +'%Y-%m-%d')"
          git push

      - name: Build status site
        id: site
        run: |
          python build_site.py
          echo "built=true" >> "$GITHUB_OUTPUT"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy-pages:
    needs: update-stocks
    if: needs.update-stocks.outputs.site_built == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
